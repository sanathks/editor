<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Editor - Markdown Editor</title>
  <meta name="description" content="A beautiful block-level markdown editor. Click to edit, preview by default. Shareable via URL.">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/lz-string@1.5.0/libs/lz-string.min.js"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            storm: {
              bg: '#1a1b26',
              bg2: '#24283b',
              bg3: '#1e2030',
              fg: '#a9b1d6',
              fgBright: '#c0caf5',
              accent: '#7aa2f7',
              green: '#9ece6a',
              red: '#f7768e',
              yellow: '#e0af68',
              purple: '#bb9af7',
              cyan: '#7dcfff',
              orange: '#ff9e64',
              muted: '#565f89',
              border: '#414868',
            }
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      background: #1a1b26; 
      color: #a9b1d6; 
      font-family: 'Inter', -apple-system, sans-serif;
      overflow: hidden;
      height: 100vh;
    }

    /* Toolbar */
    .tool-btn { 
      width: 36px; height: 36px; 
      display: flex; align-items: center; justify-content: center;
      background: transparent; border: none; border-radius: 8px;
      color: #a9b1d6; cursor: pointer; transition: all 0.15s;
      position: relative;
    }
    .tool-btn:hover { background: rgba(122, 162, 247, 0.15); }
    .tool-btn.active { background: #7aa2f7; color: #1a1b26; }
    .tool-btn svg { width: 20px; height: 20px; }
    .divider { width: 1px; height: 24px; background: #414868; margin: 0 4px; flex-shrink: 0; }
    
    .dropdown { position: relative; }
    .dropdown-menu { 
      position: absolute; top: 44px; left: 50%; transform: translateX(-50%);
      background: #24283b; border: 1px solid #414868; border-radius: 8px;
      padding: 6px; min-width: 140px; z-index: 100; display: none;
    }
    .dropdown.open .dropdown-menu { display: block; }
    .dropdown-item {
      display: flex; align-items: center; gap: 8px; padding: 8px 12px;
      border-radius: 6px; cursor: pointer; color: #a9b1d6; font-size: 13px;
      white-space: nowrap;
    }
    .dropdown-item:hover { background: rgba(122, 162, 247, 0.15); }

    /* Editor area */
    #editor {
      max-width: 800px;
      margin: 0 auto;
      padding: 80px 40px 120px;
      min-height: 100%;
    }

    /* Block styles */
    .block {
      position: relative;
      border-radius: 4px;
      transition: background 0.1s;
      cursor: text;
    }
    .block:hover {
      background: rgba(122, 162, 247, 0.04);
    }
    .block.editing {
      background: rgba(122, 162, 247, 0.08);
    }

    /* Preview content styles */
    .block-preview h1 { font-size: 2em; font-weight: 700; color: #c0caf5; margin: 0.6em 0 0.3em; line-height: 1.2; }
    .block-preview h2 { font-size: 1.5em; font-weight: 600; color: #c0caf5; margin: 0.5em 0 0.25em; line-height: 1.3; border-bottom: 1px solid #414868; padding-bottom: 0.2em; }
    .block-preview h3 { font-size: 1.25em; font-weight: 600; color: #c0caf5; margin: 0.4em 0 0.2em; }
    .block-preview h4 { font-size: 1.1em; font-weight: 600; color: #c0caf5; margin: 0.3em 0 0.15em; }
    .block-preview h5, .block-preview h6 { font-size: 1em; font-weight: 600; color: #a9b1d6; margin: 0.3em 0 0.15em; }
    .block-preview p { margin: 0.4em 0; line-height: 1.7; }
    .block-preview a { color: #7aa2f7; text-decoration: underline; }
    .block-preview strong { color: #c0caf5; font-weight: 600; }
    .block-preview em { color: #bb9af7; }
    .block-preview code { 
      background: #24283b; padding: 2px 6px; border-radius: 4px; 
      font-family: 'JetBrains Mono', monospace; font-size: 0.85em; color: #ff9e64;
    }
    .block-preview pre { 
      background: #24283b; padding: 16px; border-radius: 8px; 
      margin: 0.5em 0; overflow-x: auto; border: 1px solid #414868;
    }
    .block-preview pre code { background: none; padding: 0; color: #a9b1d6; display: block; }
    .block-preview blockquote { 
      border-left: 3px solid #7aa2f7; padding-left: 16px; margin: 0.5em 0;
      color: #565f89; font-style: italic;
    }
    .block-preview ul, .block-preview ol { padding-left: 1.5em; margin: 0.3em 0; }
    .block-preview li { margin: 0.15em 0; line-height: 1.6; }
    .block-preview hr { border: none; border-top: 1px solid #414868; margin: 1em 0; }
    .block-preview del { color: #565f89; }
    .block-preview img { max-width: 100%; border-radius: 8px; margin: 0.5em 0; }
    
    /* Table styles */
    .block-preview table { 
      border-collapse: collapse; width: 100%; margin: 0.5em 0;
      border: 1px solid #414868;
    }
    .block-preview th { 
      background: #24283b; padding: 8px 12px; text-align: left; 
      border: 1px solid #414868; font-weight: 600; color: #c0caf5;
    }
    .block-preview td { 
      padding: 8px 12px; border: 1px solid #414868;
    }

    /* Checkbox styles */
    .block-preview input[type="checkbox"] {
      appearance: none; -webkit-appearance: none;
      width: 18px; height: 18px; border: 2px solid #414868; border-radius: 4px;
      background: transparent; cursor: pointer; vertical-align: middle;
      margin-right: 6px; position: relative; top: -1px;
    }
    .block-preview input[type="checkbox"]:checked {
      background: #9ece6a; border-color: #9ece6a;
    }
    .block-preview input[type="checkbox"]:checked::after {
      content: '✓'; color: #1a1b26; font-size: 12px; font-weight: bold;
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    }
    .block-preview li.task-list-item {
      list-style: none; margin-left: -1.5em;
    }
    .block-preview li.task-list-item.checked {
      color: #9ece6a; text-decoration: line-through;
    }

    /* Collapsible headings */
    .collapse-toggle {
      position: absolute; left: -24px; top: 50%; transform: translateY(-50%);
      width: 20px; height: 20px; background: none; border: none;
      color: #565f89; cursor: pointer; font-size: 12px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 4px; opacity: 0; transition: opacity 0.15s;
    }
    .block:hover .collapse-toggle { opacity: 1; }
    .collapse-toggle:hover { background: rgba(122, 162, 247, 0.15); color: #a9b1d6; }
    .collapsed-children { display: none; }

    /* Edit textarea */
    .block-edit textarea {
      width: 100%;
      background: transparent;
      color: #c0caf5;
      border: none;
      outline: none;
      font-family: 'JetBrains Mono', monospace;
      font-size: 14px;
      line-height: 1.6;
      resize: none;
      overflow: hidden;
      padding: 4px 8px;
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #414868; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #565f89; }

    /* Footer */
    #footer {
      position: fixed; bottom: 0; left: 0; right: 0;
      display: flex; justify-content: center; padding: 12px;
      font-size: 11px; color: #565f89; gap: 16px;
      background: linear-gradient(transparent, #1a1b26 40%);
      pointer-events: none;
    }
    #footer a { color: #565f89; text-decoration: none; pointer-events: auto; }
    #footer a:hover { color: #7aa2f7; }

    /* Toast */
    .toast {
      position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%);
      background: #24283b; color: #9ece6a; padding: 8px 20px; border-radius: 8px;
      font-size: 13px; border: 1px solid #414868; z-index: 200;
      animation: fadeInUp 0.2s ease, fadeOut 0.3s ease 1.5s forwards;
    }
    @keyframes fadeInUp { from { opacity: 0; transform: translateX(-50%) translateY(10px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
    @keyframes fadeOut { to { opacity: 0; } }

    /* Empty state */
    #emptyState {
      text-align: center; padding: 120px 20px; color: #565f89;
    }
    #emptyState h2 { color: #a9b1d6; font-size: 1.3em; margin-bottom: 8px; }
    #emptyState p { font-size: 14px; }
    #emptyState kbd {
      background: #24283b; padding: 2px 8px; border-radius: 4px;
      border: 1px solid #414868; font-size: 12px; color: #a9b1d6;
    }
  </style>
</head>
<body class="h-screen flex flex-col">

  <script>
    // ========== State ==========
    let blocks = []; // Array of { id, markdown, collapsed }
    let editingBlockId = null;
    let undoStack = [];
    let redoStack = [];
    let blockIdCounter = 0;
    const MAX_UNDO = 50;

    // ========== Marked config ==========
    marked.setOptions({
      gfm: true,
      breaks: true,
    });

    // Custom renderer for checkboxes
    const renderer = new marked.Renderer();
    const origListItem = renderer.listitem;
    renderer.listitem = function(text, task, checked) {
      // Handle both marked v4+ object format and v3 args
      let t, isTask, isChecked;
      if (typeof text === 'object' && text !== null) {
        t = text.text || text.tokens?.map(tok => tok.raw || tok.text).join('') || String(text);
        isTask = text.task;
        isChecked = text.checked;
      } else {
        t = text;
        isTask = task;
        isChecked = checked;
      }
      if (isTask) {
        const cls = isChecked ? 'task-list-item checked' : 'task-list-item';
        const check = isChecked 
          ? '<input type="checkbox" checked disabled>' 
          : '<input type="checkbox" disabled>';
        // Remove the default checkbox that marked inserts
        const cleanText = t.replace(/^<input[^>]*>\s*/, '');
        return `<li class="${cls}">${check}${cleanText}</li>\n`;
      }
      return `<li>${t}</li>\n`;
    };

    function renderMarkdown(md) {
      return marked.parse(md, { renderer });
    }

    // ========== Block management ==========
    function newBlock(markdown = '', collapsed = false) {
      return { id: ++blockIdCounter, markdown, collapsed };
    }

    function parseDocToBlocks(doc) {
      if (!doc.trim()) return [];
      const lines = doc.split('\n');
      const result = [];
      let current = [];
      let inCodeBlock = false;

      for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        
        // Track code fences
        if (line.trim().startsWith('```')) {
          if (inCodeBlock) {
            current.push(line);
            result.push(newBlock(current.join('\n')));
            current = [];
            inCodeBlock = false;
            continue;
          } else {
            if (current.length) {
              result.push(newBlock(current.join('\n')));
              current = [];
            }
            current.push(line);
            inCodeBlock = true;
            continue;
          }
        }

        if (inCodeBlock) {
          current.push(line);
          continue;
        }

        // Heading = new block
        if (/^#{1,6}\s/.test(line)) {
          if (current.length) {
            result.push(newBlock(current.join('\n')));
            current = [];
          }
          result.push(newBlock(line));
          continue;
        }

        // HR = new block
        if (/^(-{3,}|\*{3,}|_{3,})\s*$/.test(line.trim())) {
          if (current.length) {
            result.push(newBlock(current.join('\n')));
            current = [];
          }
          result.push(newBlock(line));
          continue;
        }

        // Empty line: end current block
        if (line.trim() === '') {
          if (current.length) {
            result.push(newBlock(current.join('\n')));
            current = [];
          }
          continue;
        }

        current.push(line);
      }

      if (current.length) {
        result.push(newBlock(current.join('\n')));
      }

      return result;
    }

    function getFullMarkdown() {
      return blocks.map(b => b.markdown).join('\n\n');
    }

    // ========== Rendering ==========
    function render() {
      const editor = document.getElementById('editor');
      const emptyState = document.getElementById('emptyState');

      if (blocks.length === 0) {
        editor.innerHTML = '';
        emptyState.style.display = 'block';
        return;
      }

      emptyState.style.display = 'none';

      // Determine heading hierarchy for collapse
      const headingLevels = blocks.map(b => {
        const m = b.markdown.match(/^(#{1,6})\s/);
        return m ? m[1].length : 0;
      });

      // Determine which blocks are hidden due to collapse
      const hidden = new Set();
      for (let i = 0; i < blocks.length; i++) {
        if (headingLevels[i] > 0 && blocks[i].collapsed) {
          const level = headingLevels[i];
          for (let j = i + 1; j < blocks.length; j++) {
            if (headingLevels[j] > 0 && headingLevels[j] <= level) break;
            hidden.add(blocks[j].id);
          }
        }
      }

      let html = '';
      for (let i = 0; i < blocks.length; i++) {
        const b = blocks[i];
        if (hidden.has(b.id)) continue;

        const isEditing = b.id === editingBlockId;
        const isHeading = headingLevels[i] > 0;

        html += `<div class="block ${isEditing ? 'editing' : ''}" data-id="${b.id}" onclick="startEdit(${b.id}, event)">`;

        // Collapse toggle for headings
        if (isHeading) {
          const arrow = b.collapsed ? '▸' : '▾';
          html += `<button class="collapse-toggle" onclick="toggleCollapse(${b.id}, event)" title="Collapse">${arrow}</button>`;
        }

        if (isEditing) {
          html += `<div class="block-edit"><textarea id="editArea" onblur="finishEdit()" oninput="autoResize(this)">${escapeHtml(b.markdown)}</textarea></div>`;
        } else {
          const rendered = renderMarkdown(b.markdown);
          html += `<div class="block-preview">${rendered}</div>`;
        }

        html += `</div>`;
      }

      editor.innerHTML = html;

      // Focus textarea if editing
      if (editingBlockId) {
        const ta = document.getElementById('editArea');
        if (ta) {
          ta.focus();
          autoResize(ta);
          // Put cursor at end
          ta.selectionStart = ta.selectionEnd = ta.value.length;
        }
      }
    }

    function escapeHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function autoResize(ta) {
      ta.style.height = 'auto';
      ta.style.height = ta.scrollHeight + 'px';
    }

    // ========== Editing ==========
    function startEdit(id, e) {
      if (e && (e.target.closest('.collapse-toggle') || e.target.tagName === 'A' || e.target.tagName === 'INPUT')) return;
      if (editingBlockId === id) return;
      if (editingBlockId !== null) finishEdit();
      editingBlockId = id;
      render();
    }

    function finishEdit() {
      if (editingBlockId === null) return;
      const ta = document.getElementById('editArea');
      if (ta) {
        const block = blocks.find(b => b.id === editingBlockId);
        if (block) {
          const newMd = ta.value;
          if (newMd !== block.markdown) {
            pushUndo();
            // Check if the edit created multiple blocks (e.g., pasting)
            if (newMd.includes('\n\n') || /\n#{1,6}\s/.test(newMd)) {
              // Re-parse this block into multiple blocks
              const newBlocks = parseDocToBlocks(newMd);
              const idx = blocks.findIndex(b => b.id === editingBlockId);
              blocks.splice(idx, 1, ...newBlocks);
            } else {
              block.markdown = newMd;
            }
            // Remove empty blocks
            blocks = blocks.filter(b => b.markdown.trim() !== '');
            saveToUrl();
          }
        }
      }
      editingBlockId = null;
      render();
    }

    function toggleCollapse(id, e) {
      e.stopPropagation();
      const block = blocks.find(b => b.id === id);
      if (block) {
        block.collapsed = !block.collapsed;
        render();
      }
    }

    // ========== Toolbar actions ==========
    function insertBlock(md) {
      pushUndo();
      if (editingBlockId !== null) {
        finishEdit();
      }
      blocks.push(newBlock(md));
      editingBlockId = blocks[blocks.length - 1].id;
      saveToUrl();
      render();
    }

    function wrapSelection(wrapper) {
      const ta = document.getElementById('editArea');
      if (!ta) {
        // No active editing block, insert new block
        insertBlock(wrapper + 'text' + wrapper);
        return;
      }
      const start = ta.selectionStart;
      const end = ta.selectionEnd;
      const text = ta.value;
      const selected = text.substring(start, end) || 'text';
      const newText = text.substring(0, start) + wrapper + selected + wrapper + text.substring(end);
      
      pushUndo();
      const block = blocks.find(b => b.id === editingBlockId);
      if (block) block.markdown = newText;
      ta.value = newText;
      ta.selectionStart = start + wrapper.length;
      ta.selectionEnd = start + wrapper.length + selected.length;
      ta.focus();
    }

    function insertLink() {
      const ta = document.getElementById('editArea');
      const url = prompt('Enter URL:');
      if (!url) return;
      if (!ta) {
        insertBlock(`[Link](${url})`);
        return;
      }
      const start = ta.selectionStart;
      const end = ta.selectionEnd;
      const text = ta.value;
      const selected = text.substring(start, end) || 'Link';
      const newText = text.substring(0, start) + `[${selected}](${url})` + text.substring(end);
      
      pushUndo();
      const block = blocks.find(b => b.id === editingBlockId);
      if (block) block.markdown = newText;
      ta.value = newText;
      ta.focus();
    }

    // ========== Undo/Redo ==========
    function pushUndo() {
      undoStack.push(JSON.stringify(blocks.map(b => ({ ...b }))));
      if (undoStack.length > MAX_UNDO) undoStack.shift();
      redoStack = [];
    }

    function doUndo() {
      if (!undoStack.length) return;
      redoStack.push(JSON.stringify(blocks.map(b => ({ ...b }))));
      const state = JSON.parse(undoStack.pop());
      blocks = state;
      editingBlockId = null;
      saveToUrl();
      render();
    }

    function doRedo() {
      if (!redoStack.length) return;
      undoStack.push(JSON.stringify(blocks.map(b => ({ ...b }))));
      const state = JSON.parse(redoStack.pop());
      blocks = state;
      editingBlockId = null;
      saveToUrl();
      render();
    }

    // ========== URL storage ==========
    function saveToUrl() {
      const md = getFullMarkdown();
      if (!md.trim()) {
        history.replaceState(null, '', location.pathname);
        return;
      }
      const compressed = LZString.compressToEncodedURIComponent(md);
      history.replaceState(null, '', '#doc=' + compressed);
    }

    function loadFromUrl() {
      const hash = location.hash;
      if (!hash.startsWith('#doc=')) return '';
      const compressed = hash.substring(5);
      try {
        return LZString.decompressFromEncodedURIComponent(compressed) || '';
      } catch { return ''; }
    }

    // ========== Export / Share ==========
    function exportMd() {
      const md = getFullMarkdown();
      const blob = new Blob([md], { type: 'text/markdown' });
      const a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'document.md';
      a.click();
    }

    function shareDoc() {
      navigator.clipboard.writeText(location.href).then(() => showToast('Link copied!'));
    }

    function clearDoc() {
      if (blocks.length === 0) return;
      if (!confirm('Clear the entire document?')) return;
      pushUndo();
      blocks = [];
      editingBlockId = null;
      saveToUrl();
      render();
    }

    function showToast(msg) {
      const t = document.createElement('div');
      t.className = 'toast';
      t.textContent = msg;
      document.body.appendChild(t);
      setTimeout(() => t.remove(), 2000);
    }

    // ========== Dropdowns ==========
    function toggleDropdown(id) {
      const el = document.getElementById(id);
      const wasOpen = el.classList.contains('open');
      closeDropdowns();
      if (!wasOpen) el.classList.add('open');
    }
    function closeDropdowns() {
      document.querySelectorAll('.dropdown').forEach(d => d.classList.remove('open'));
    }
    document.addEventListener('click', e => {
      if (!e.target.closest('.dropdown')) closeDropdowns();
    });

    // ========== Keyboard shortcuts ==========
    document.addEventListener('keydown', e => {
      const ta = document.getElementById('editArea');

      // Ctrl/Cmd + B
      if ((e.ctrlKey || e.metaKey) && e.key === 'b') {
        e.preventDefault();
        wrapSelection('**');
      }
      // Ctrl/Cmd + I
      if ((e.ctrlKey || e.metaKey) && e.key === 'i') {
        e.preventDefault();
        wrapSelection('*');
      }
      // Ctrl/Cmd + K
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        insertLink();
      }
      // Ctrl/Cmd + Z
      if ((e.ctrlKey || e.metaKey) && e.key === 'z' && !e.shiftKey) {
        if (ta) return; // Let textarea handle it
        e.preventDefault();
        doUndo();
      }
      // Ctrl/Cmd + Shift + Z
      if ((e.ctrlKey || e.metaKey) && e.key === 'z' && e.shiftKey) {
        if (ta) return;
        e.preventDefault();
        doRedo();
      }
      // Escape - finish editing
      if (e.key === 'Escape' && editingBlockId !== null) {
        e.preventDefault();
        finishEdit();
      }
      // Enter on empty state - create first block
      if (e.key === 'Enter' && blocks.length === 0 && !ta) {
        e.preventDefault();
        blocks.push(newBlock(''));
        editingBlockId = blocks[0].id;
        render();
      }
      // Tab in editing mode - indent
      if (e.key === 'Tab' && ta) {
        e.preventDefault();
        const start = ta.selectionStart;
        const end = ta.selectionEnd;
        if (e.shiftKey) {
          // Outdent
          const before = ta.value.substring(0, start);
          const lineStart = before.lastIndexOf('\n') + 1;
          const linePrefix = ta.value.substring(lineStart, start);
          if (linePrefix.startsWith('  ')) {
            ta.value = ta.value.substring(0, lineStart) + ta.value.substring(lineStart + 2);
            ta.selectionStart = ta.selectionEnd = start - 2;
          }
        } else {
          ta.value = ta.value.substring(0, start) + '  ' + ta.value.substring(end);
          ta.selectionStart = ta.selectionEnd = start + 2;
        }
        const block = blocks.find(b => b.id === editingBlockId);
        if (block) block.markdown = ta.value;
      }
      // Enter in textarea - handle list continuation
      if (e.key === 'Enter' && ta && !e.shiftKey && !e.ctrlKey && !e.metaKey) {
        const pos = ta.selectionStart;
        const text = ta.value;
        const lineStart = text.lastIndexOf('\n', pos - 1) + 1;
        const currentLine = text.substring(lineStart, pos);
        
        // Check for list patterns
        let prefix = '';
        const bulletMatch = currentLine.match(/^(\s*)([-*+])\s/);
        const numMatch = currentLine.match(/^(\s*)(\d+)\.\s/);
        const checkMatch = currentLine.match(/^(\s*)- \[[ x]\]\s/);
        
        if (checkMatch) {
          // Empty checklist item - remove it
          if (currentLine.trim() === '- [ ]' || currentLine.trim() === '- [x]') {
            e.preventDefault();
            ta.value = text.substring(0, lineStart) + text.substring(pos);
            ta.selectionStart = ta.selectionEnd = lineStart;
            const block = blocks.find(b => b.id === editingBlockId);
            if (block) block.markdown = ta.value;
            autoResize(ta);
            return;
          }
          prefix = checkMatch[1] + '- [ ] ';
        } else if (bulletMatch) {
          if (currentLine.trim() === '-' || currentLine.trim() === '*' || currentLine.trim() === '+') {
            e.preventDefault();
            ta.value = text.substring(0, lineStart) + text.substring(pos);
            ta.selectionStart = ta.selectionEnd = lineStart;
            const block = blocks.find(b => b.id === editingBlockId);
            if (block) block.markdown = ta.value;
            autoResize(ta);
            return;
          }
          prefix = bulletMatch[1] + bulletMatch[2] + ' ';
        } else if (numMatch) {
          if (currentLine.trim() === numMatch[2] + '.') {
            e.preventDefault();
            ta.value = text.substring(0, lineStart) + text.substring(pos);
            ta.selectionStart = ta.selectionEnd = lineStart;
            const block = blocks.find(b => b.id === editingBlockId);
            if (block) block.markdown = ta.value;
            autoResize(ta);
            return;
          }
          prefix = numMatch[1] + (parseInt(numMatch[2]) + 1) + '. ';
        }

        if (prefix) {
          e.preventDefault();
          ta.value = text.substring(0, pos) + '\n' + prefix + text.substring(pos);
          ta.selectionStart = ta.selectionEnd = pos + 1 + prefix.length;
          const block = blocks.find(b => b.id === editingBlockId);
          if (block) block.markdown = ta.value;
          autoResize(ta);
        }
      }
    });

    // Click outside editor to finish editing
    document.getElementById('main').addEventListener('click', e => {
      if (!e.target.closest('.block') && editingBlockId !== null) {
        finishEdit();
      }
      // Click on empty area below blocks to add new block
      if (!e.target.closest('.block') && !e.target.closest('#emptyState') && blocks.length > 0) {
        const editor = document.getElementById('editor');
        const rect = editor.getBoundingClientRect();
        if (e.clientY > rect.bottom - 100) {
          pushUndo();
          const b = newBlock('');
          blocks.push(b);
          editingBlockId = b.id;
          render();
        }
      }
    });

    // Click empty state
    document.getElementById('emptyState').addEventListener('click', () => {
      const b = newBlock('');
      blocks.push(b);
      editingBlockId = b.id;
      render();
    });

    // Handle checkbox clicks in preview
    document.getElementById('editor').addEventListener('change', e => {
      if (e.target.type === 'checkbox') {
        const blockEl = e.target.closest('.block');
        if (!blockEl) return;
        const id = parseInt(blockEl.dataset.id);
        const block = blocks.find(b => b.id === id);
        if (!block) return;

        pushUndo();
        // Find which checkbox this is (nth in the block)
        const allCheckboxes = blockEl.querySelectorAll('input[type="checkbox"]');
        let checkIdx = 0;
        for (let i = 0; i < allCheckboxes.length; i++) {
          if (allCheckboxes[i] === e.target) { checkIdx = i; break; }
        }

        // Toggle in markdown
        let count = 0;
        block.markdown = block.markdown.replace(/- \[([ x])\]/g, (match, state) => {
          if (count++ === checkIdx) {
            return state === 'x' ? '- [ ]' : '- [x]';
          }
          return match;
        });

        saveToUrl();
        render();
      }
    });

    // Enable checkbox clicking
    document.getElementById('editor').addEventListener('click', e => {
      if (e.target.type === 'checkbox') {
        e.stopPropagation(); // Don't trigger block edit
        e.target.checked = !e.target.checked; // Toggle since we disabled it
        e.target.dispatchEvent(new Event('change', { bubbles: true }));
      }
    });

    // ========== Init ==========
    function init() {
      const doc = loadFromUrl();
      if (doc) {
        blocks = parseDocToBlocks(doc);
      }
      render();
    }

    // Handle back/forward
    window.addEventListener('hashchange', () => {
      const doc = loadFromUrl();
      blocks = doc ? parseDocToBlocks(doc) : [];
      editingBlockId = null;
      render();
    });

    init();
  </script>
</body>
</html>
